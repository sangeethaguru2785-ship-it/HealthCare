<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly Health Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .error-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .error-illustration {
            margin-bottom: 40px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563EB 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 1.05rem;
            color: var(--text-light);
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .error-buttons .btn {
            min-width: 180px;
        }

        .error-links {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .error-links p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .error-links-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .error-links-grid a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .error-links-grid a:hover {
            color: var(--secondary);
            gap: 12px;
        }

        .error-links-grid a i {
            font-size: 0.85rem;
        }

        /* Floating shapes */
        .floating-shape {
            position: absolute;
            opacity: 0.1;
            z-index: 0;
        }

        .shape-1 {
            top: 15%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
        }

        .shape-2 {
            top: 25%;
            right: 15%;
            animation: float 5s ease-in-out infinite 1s;
        }

        .shape-3 {
            bottom: 20%;
            left: 15%;
            animation: float 7s ease-in-out infinite 2s;
        }

        .shape-4 {
            bottom: 30%;
            right: 10%;
            animation: float 6s ease-in-out infinite 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.5rem; }
            .error-message { font-size: 1rem; }
            .error-buttons { flex-direction: column; align-items: center; }
            .error-links-grid { flex-direction: column; align-items: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <!-- 404 Error Section -->
    <section class="error-section">
        <!-- Floating decorative shapes -->
        <div class="floating-shape shape-1">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="30" cy="30" r="30" fill="#2563EB"/>
            </svg>
        </div>
        <div class="floating-shape shape-2">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="8" fill="#60A5FA"/>
            </svg>
        </div>
        <div class="floating-shape shape-3">
            <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="25,5 45,45 5,45" fill="#2563EB"/>
            </svg>
        </div>
        <div class="floating-shape shape-4">
            <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="17.5" cy="17.5" r="17.5" fill="#60A5FA"/>
            </svg>
        </div>

        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Oops! The page you're looking for seems to have gone on a coffee break. 
                Don't worry, let's get you back on track to better health.
            </p>

            <!-- Action Buttons -->
            <div class="error-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    <span>Back to Home</span>
                </a>
                <a href="pages/appointment.html" class="btn btn-outline">
                    <i class="fas fa-calendar-check"></i>
                    <span>Book Appointment</span>
                </a>
            </div>

            <!-- Quick Links -->
            <div class="error-links">
                <p>Or try one of these links:</p>
                <div class="error-links-grid">
                    <a href="pages/about.html">
                        <i class="fas fa-info-circle"></i>
                        <span>About Us</span>
                    </a>
                    <a href="pages/services.html">
                        <i class="fas fa-stethoscope"></i>
                        <span>Our Services</span>
                    </a>
                    <a href="pages/doctors.html">
                        <i class="fas fa-user-md"></i>
                        <span>Our Doctors</span>
                    </a>
                    <a href="pages/contact.html">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
