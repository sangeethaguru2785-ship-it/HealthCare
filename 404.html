<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly Health Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0F172A url('images/404.webp') no-repeat center center;
            background-size: cover;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .error-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 0;
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .error-illustration {
            margin-bottom: 40px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563EB 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .error-buttons .btn {
            min-width: 180px;
        }

        .error-links {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .error-links p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .error-links-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .error-links-grid a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .error-links-grid a:hover {
            color: var(--secondary);
            gap: 12px;
        }

        .error-links-grid a i {
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.5rem; }
            .error-message { font-size: 1rem; }
            .error-buttons { flex-direction: column; align-items: center; }
            .error-links-grid { flex-direction: column; align-items: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <!-- 404 Error Section -->
    <section class="error-section">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Oops! The page you're looking for seems to have gone on a coffee break. 
                Don't worry, let's get you back on track to better health.
            </p>

            <!-- Action Buttons -->
            <div class="error-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    <span>Back to Home</span>
                </a>
                <a href="pages/appointment.html" class="btn btn-outline">
                    <i class="fas fa-calendar-check"></i>
                    <span>Book Appointment</span>
                </a>
            </div>

            <!-- Quick Links -->
            <div class="error-links">
                <p>Or try one of these links:</p>
                <div class="error-links-grid">
                    <a href="pages/about.html">
                        <i class="fas fa-info-circle"></i>
                        <span>About Us</span>
                    </a>
                    <a href="pages/services.html">
                        <i class="fas fa-stethoscope"></i>
                        <span>Our Services</span>
                    </a>
                    <a href="pages/doctors.html">
                        <i class="fas fa-user-md"></i>
                        <span>Our Doctors</span>
                    </a>
                    <a href="pages/contact.html">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
